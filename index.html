<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Alves</title>
    <meta name="description" content="Maya Alves — Canal privé et privé">
    <meta property="og:title" content="Maya Alves — Rejoins-moi">
    <meta property="og:description" content="Canal privé, privé, juste pour toi...">
    <meta property="og:image" content="photo.jpg">
    <meta property="og:type" content="website">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose: #e8b4b8;
            --rose-light: #f5d5d8;
            --gold: #d4a574;
            --cream: #fff5eb;
            --black: #0a0a0a;
            --dark: #141414;
        }

        @property --angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: #fff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            justify-content: center;
            gap: 2rem;
        }

        /* PHOTO */
        .photo-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(from var(--angle), var(--rose), var(--gold), var(--rose-light), var(--rose), var(--gold), var(--rose));
            animation: spin 4s linear infinite;
            box-shadow:
                0 0 30px rgba(232, 180, 184, 0.3),
                0 0 60px rgba(212, 165, 116, 0.15);
        }

        @keyframes spin { to { --angle: 360deg; } }

        .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            border-radius: 50%;
            display: block;
        }

        .photo-wrapper::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(from var(--angle), transparent, rgba(232, 180, 184, 0.3), transparent, rgba(212, 165, 116, 0.2), transparent);
            animation: spin 4s linear infinite reverse;
            z-index: -1;
            filter: blur(8px);
        }

        /* NOM */
        .name {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(2.8rem, 12vw, 4.5rem);
            letter-spacing: 0.02em;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--rose-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: nameShimmer 3s ease-in-out infinite alternate;
        }

        @keyframes nameShimmer {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }

        /* TAGLINE */
        .tagline {
            font-size: clamp(0.95rem, 3vw, 1.15rem);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: -0.5rem;
        }

        /* MESSAGE */
        .message {
            max-width: 380px;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .message p {
            font-size: clamp(0.95rem, 2.5vw, 1.05rem);
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
            font-weight: 400;
        }

        .message strong {
            color: var(--rose-light);
            font-weight: 600;
        }

        /* TELEGRAM BUTTON */
        .telegram-cta {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
            max-width: 340px;
            padding: 1.1rem 2rem;
            border-radius: 60px;
            background: linear-gradient(135deg, #26A5E4 0%, #0088cc 100%);
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.02em;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow:
                0 4px 20px rgba(38, 165, 228, 0.4),
                0 0 40px rgba(38, 165, 228, 0.1);
            overflow: hidden;
        }

        .telegram-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        .telegram-cta:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow:
                0 8px 35px rgba(38, 165, 228, 0.5),
                0 0 60px rgba(38, 165, 228, 0.2);
        }

        .telegram-cta:active {
            transform: translateY(-1px) scale(1.01);
        }

        .telegram-cta svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        /* PULSE RING */
        .pulse-ring {
            position: relative;
        }

        .pulse-ring::before,
        .pulse-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 60px;
            border: 2px solid rgba(38, 165, 228, 0.4);
            animation: pulse 2s ease-out infinite;
        }

        .pulse-ring::after {
            animation-delay: 1s;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.08); }
        }

        /* FOOTER */
        .footer {
            margin-top: auto;
            padding-top: 2rem;
        }

        .footer-text {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ANIMATIONS */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease forwards;
        }

        .fade-up.d1 { animation-delay: 0.2s; }
        .fade-up.d2 { animation-delay: 0.4s; }
        .fade-up.d3 { animation-delay: 0.6s; }
        .fade-up.d4 { animation-delay: 0.8s; }
        .fade-up.d5 { animation-delay: 1s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* PARTICLES */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--rose);
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* RESPONSIVE */
        @media (max-width: 380px) {
            .photo-wrapper { width: 220px; height: 220px; }
            .container { padding: 1.5rem 1rem; }
        }

        @media (min-height: 800px) {
            .container { gap: 2.5rem; }
        }

        ::-webkit-scrollbar { width: 0; }
        ::selection { background: var(--rose); color: var(--black); }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="container">

        <div class="photo-wrapper fade-up">
            <img src="photo.jpg?v=2" alt="Maya Alves">
        </div>

        <h1 class="name fade-up d1">Maya Alves</h1>

        <p class="tagline fade-up d2">Canal privé</p>

        <div class="message fade-up d3">
            <p>
                Mon contenu le plus <strong>intime et privé</strong> est sur Telegram.<br><br>
                Un seul clic pour y accéder...
            </p>
        </div>

        <div class="pulse-ring fade-up d4">
            <a href="https://t.me/+8xTdDg6nndM2Yzg0" target="_blank" class="telegram-cta">
                <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#ffffff"/></svg>
                Rejoins-moi sur Telegram
            </a>
        </div>

        <div class="footer fade-up d5">
            <p class="footer-text">Maya Alves &mdash; 2026</p>
        </div>

    </div>

    <script>
        (function () {
            var container = document.getElementById('particles');
            for (var i = 0; i < 25; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (8 + Math.random() * 12) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
                container.appendChild(p);
            }
        })();
    </script>

</body>
</html>
